<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scholars Elite · Family Recruiting Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <style>
      *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
      body{margin:0;background:#09060F;font-family:'DM Sans',system-ui,sans-serif;}
      input,textarea,select{color-scheme:dark;font-family:inherit;}
      button{font-family:inherit;border:none;background:none;padding:0;}
      ::-webkit-scrollbar{width:3px;}
      ::-webkit-scrollbar-thumb{background:#2A1D45;border-radius:2px;}
      input[type=range]::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:#C233BF;cursor:ew-resize;box-shadow:0 0 6px #C233BF70;}
      @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
      @keyframes popIn{0%{transform:scale(0.85);opacity:0;}70%{transform:scale(1.04);}100%{transform:scale(1);opacity:1;}}
      @keyframes spin{to{transform:rotate(360deg);}}
      .fade-up{animation:fadeUp 0.4s ease forwards;}
      .pop-in{animation:popIn 0.35s ease forwards;}
      .spinner{width:20px;height:20px;border:2px solid #2A1D45;border-top-color:#C233BF;border-radius:50%;animation:spin 0.7s linear infinite;}
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
