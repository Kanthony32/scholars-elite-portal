    {unlocked&&<button onClick={()=>setShowReport(true)} className="w-full py-4 rounded-2xl font-bold flex items-center justify-center gap-2 mb-4" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`,color:"white",cursor:"pointer",fontSize:15,boxShadow:`0 8px 30px ${C.primary}40`}}>🏆 View Full Placement Report →</button>}
    <div style={{color:C.muted,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Completion Checklist</div>
    <div className="flex flex-col gap-2">{items.map((item,i)=><div key={i} className="flex items-center gap-3 p-3.5 rounded-xl" style={{background:item.done?C.green+"12":C.card,border:`1px solid ${item.done?C.green+"44":C.border}`}}><div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:item.done?C.green+"22":C.card2,border:`1px solid ${item.done?C.green+"44":C.border}`}}>{item.done?<CheckIc size={16} style={{color:C.green}}/>:<span style={{fontSize:16}}>{item.icon}</span>}</div><div className="flex-1"><div style={{color:item.done?C.green:C.text,fontWeight:600,fontSize:13,textDecoration:item.done?"line-through":"none"}}>{item.l}</div>{!item.done&&item.hint&&<div style={{color:C.muted,fontSize:11}}>{item.hint}</div>}</div><div className="text-xs font-black px-2 py-1 rounded-lg" style={{background:item.done?C.green+"22":C.card2,color:item.done?C.green:C.muted,border:`1px solid ${item.done?C.green+"33":C.border}`}}>+{item.pts}</div></div>)}</div>
  </div>;
}

function ScoutTab({athlete}){
  const[phase,setPhase]=useState(0);
  return<div className="fade-up">
    <div className="rounded-2xl p-5 mb-4" style={{background:C.card,border:`1px solid ${C.border}`}}>
      <div style={{color:C.muted,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Scout Packet — Scholars Elite Academy</div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",color:C.text,fontSize:22,fontWeight:800,lineHeight:1,marginBottom:4}}>{athlete.name}</div>
      <div style={{color:C.sub,fontSize:12,marginBottom:10}}>{athlete.school} · {athlete.position} · Class of {athlete.gradYear}</div>
      <div className="p-3 rounded-xl mb-3" style={{background:C.card2,border:`1px solid ${C.border}`}}><div style={{color:C.muted,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Comp Band</div><div style={{color:C.fuchsia,fontWeight:700,fontSize:13}}>{athlete.compBand}</div><div style={{color:C.muted,fontSize:11,marginTop:2}}>Long, physical, two-way wing who can pressure the rim and make plays</div></div>
      <div className="p-3 rounded-xl" style={{background:C.red+"12",border:`1px solid ${C.red}22`}}><div style={{color:C.muted,fontSize:9,letterSpacing:1.5,textTransform:"uppercase",marginBottom:4}}>Impact Marker</div><div style={{color:C.text,fontSize:12,fontWeight:600}}>🔥 {athlete.impactMarker}</div></div>
    </div>
    <div className="rounded-2xl p-5 mb-4" style={{background:C.card,border:`1px solid ${C.border}`}}>
      <div style={{color:C.muted,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>What College Scouts Evaluate — Big Wing Lens</div>
      {athlete.scoutCriteria.map((c,i)=><div key={i} className="flex gap-3 mb-3 last:mb-0 p-3 rounded-xl" style={{background:C.card2,border:`1px solid ${C.border}`}}><div className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-black flex-shrink-0" style={{background:C.primary+"30",color:C.primary}}>{i+1}</div><div><div style={{color:C.text,fontSize:13,fontWeight:700}}>{c.n}</div><div style={{color:C.muted,fontSize:11,marginTop:1}}>{c.desc}</div></div></div>)}
    </div>
    <div className="rounded-2xl p-5 mb-4" style={{background:C.card,border:`1px solid ${C.border}`}}>
      <div style={{color:C.muted,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Development Roadmap</div>
      <div className="flex gap-2 mb-4">{athlete.developmentPhases.map((p,i)=><button key={i} onClick={()=>setPhase(i)} className="flex-1 py-2 rounded-xl text-xs font-bold" style={{background:phase===i?C.primary:C.card2,color:phase===i?"white":C.muted,border:`1px solid ${phase===i?C.primary:C.border}`,cursor:"pointer"}}>{`P${i+1}`}</button>)}</div>
      {(()=>{const p=athlete.developmentPhases[phase];return<div><div style={{color:C.text,fontWeight:700,fontSize:14,marginBottom:2}}>{p.phase}</div><div style={{color:C.fuchsia,fontSize:11,fontWeight:600,marginBottom:10}}>{p.window}</div>{p.items.map((item,i)=><div key={i} className="flex items-start gap-2 mb-2"><div className="w-1.5 h-1.5 rounded-full mt-1.5 flex-shrink-0" style={{background:C.primary}}/><div style={{color:C.sub,fontSize:12,lineHeight:1.5}}>{item}</div></div>)}</div>;})()}
    </div>
    <div className="rounded-2xl p-5" style={{background:C.card,border:`1px solid ${C.border}`}}>
      <div style={{color:C.muted,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:12}}>Benchmarks (Targets)</div>
      <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
        <thead><tr>{["Category","0–90 Days","3–6 Mo","6–12 Mo"].map(h=><th key={h} style={{color:C.muted,fontWeight:700,textAlign:"left",padding:"6px 8px",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead>
        <tbody>{athlete.benchmarks.map((b,i)=><tr key={i} style={{background:i%2===0?C.card2:"transparent"}}>
          <td style={{color:C.text,fontWeight:600,padding:"8px",borderBottom:`1px solid ${C.border}22`,whiteSpace:"nowrap"}}>{b.cat}</td>
          <td style={{color:C.sub,padding:"8px",borderBottom:`1px solid ${C.border}22`}}>{b.d90}</td>
          <td style={{color:C.sub,padding:"8px",borderBottom:`1px solid ${C.border}22`}}>{b.d180}</td>
          <td style={{color:C.green,fontWeight:600,padding:"8px",borderBottom:`1px solid ${C.border}22`}}>{b.d365}</td>
        </tr>)}</tbody>
      </table></div>
    </div>
  </div>;
}

function CompareTab({athlete,board}){
  const scored=[...board].map(s=>({...s,score:calcScore(s.factors)})).sort((a,b)=>b.score-a.score);
  const[idA,setIdA]=useState(scored[0]?.id||"");const[idB,setIdB]=useState(scored[1]?.id||"");
  if(board.length<2)return<div className="rounded-2xl p-10 text-center fade-up" style={{background:C.card,border:`1px dashed ${C.border}`}}><div style={{fontSize:32,marginBottom:12}}>⚖️</div><div style={{color:C.text,fontWeight:700,marginBottom:4}}>Need 2+ schools</div><div style={{color:C.muted,fontSize:13}}>Add at least two schools first.</div></div>;
  const sA=scored.find(s=>s.id===idA);const sB=scored.find(s=>s.id===idB);
  if(!sA||!sB)return null;
  const cA=getBand(sA.score).color;const cB=getBand(sB.score).color;const winner=sA.score>sB.score?"A":sA.score<sB.score?"B":"tie";const plN=parseInt(athlete.playerLevel.replace("PL",""));
  return<div className="fade-up">
    <div style={{color:C.muted,fontSize:12,marginBottom:16}}>Compare two schools side-by-side.</div>
    <div className="grid grid-cols-2 gap-3 mb-4">{[{id:idA,set:setIdA,col:cA,s:sA},{id:idB,set:setIdB,col:cB,s:sB}].map((x,i)=><div key={i}><select value={x.id} onChange={e=>x.set(e.target.value)} className="w-full px-3 py-2 rounded-xl text-xs font-bold outline-none mb-2" style={{background:C.card2,border:`1px solid ${x.col}44`,color:x.col,cursor:"pointer"}}>{scored.map(sc=><option key={sc.id} value={sc.id}>{sc.school}</option>)}</select><div className="rounded-xl p-3 text-center" style={{background:x.col+"12",border:`1px solid ${x.col}33`}}><ScoreRing score={x.s.score} size={56}/><div style={{fontFamily:"'Barlow Condensed',sans-serif",color:C.text,fontSize:14,fontWeight:800,marginTop:6}}>{x.s.school}</div><div style={{color:C.muted,fontSize:10}}>{x.s.conference}</div><div className="flex justify-center mt-2"><TierBadge tier={x.s.tier}/></div><div style={{color:x.col,fontSize:11,fontWeight:700,marginTop:3}}>{getRecruit(plN,parseInt(x.s.tier.replace("T","")),x.s.score)}</div></div></div>)}</div>
    <div className="flex items-center gap-3 mb-3 p-3 rounded-xl" style={{background:C.card,border:`1px solid ${C.border}`}}><div className="flex-1 text-center"><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:38,fontWeight:800,color:cA,lineHeight:1}}>{sA.score}</div><div style={{color:C.muted,fontSize:10}}>Score</div></div><div style={{color:C.muted,fontSize:12,fontWeight:700}}>VS</div><div className="flex-1 text-center"><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:38,fontWeight:800,color:cB,lineHeight:1}}>{sB.score}</div><div style={{color:C.muted,fontSize:10}}>Score</div></div></div>
    {winner!=="tie"&&<div className="p-3 rounded-xl mb-4 text-center text-sm font-bold" style={{background:(winner==="A"?cA:cB)+"15",border:`1px solid ${(winner==="A"?cA:cB)}33`,color:winner==="A"?cA:cB}}>🏆 {winner==="A"?sA.school:sB.school} stronger by {Math.abs(sA.score-sB.score)} points</div>}
    <div style={{color:C.muted,fontSize:10,letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Factor Breakdown</div>
    <div className="flex flex-col gap-1.5">{Object.entries({bbLevel:"BB Level",opportunity:"Opportunity",athletic:"Athletic",skill:"Skill",academic:"Academic",style:"Style",geo:"Geography",relationship:"Relationship"}).map(([k,label])=>{const vA=(sA.factors||{})[k]||0,vB=(sB.factors||{})[k]||0;const wA=vA>vB,wB=vB>vA;return<div key={k} className="p-2.5 rounded-xl" style={{background:C.card,border:`1px solid ${C.border}`}}><div className="flex items-center gap-2 mb-1.5"><div style={{color:wA?cA:C.muted,fontSize:12,fontWeight:wA?700:400,flex:1,textAlign:"right"}}>{vA}/10</div><div style={{color:C.sub,fontSize:10,fontWeight:600,width:80,textAlign:"center",flexShrink:0}}>{label}</div><div style={{color:wB?cB:C.muted,fontSize:12,fontWeight:wB?700:400,flex:1}}>{vB}/10</div></div><div className="flex items-center gap-1"><div className="flex-1 h-1.5 rounded-full overflow-hidden flex justify-end" style={{background:C.border}}><div style={{width:`${vA*10}%`,height:"100%",background:wA?cA:C.muted+"44",borderRadius:9999}}/></div><div className="w-1 h-1 rounded-full" style={{background:C.border}}/><div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{background:C.border}}><div style={{width:`${vB*10}%`,height:"100%",background:wB?cB:C.muted+"44",borderRadius:9999}}/></div></div></div>;})}
    </div>
  </div>;
}

function App(){
  const[tab,setTab]=useState("home");const[athlete,setAthlete]=useState(ATHLETE);const[board,setBoard]=useState(BOARD);
  const progItems=[!!(athlete.gpa),!!(athlete.highlightLink),board.length>=3,!!(athlete.recruitingStory),!!(athlete.strengths),(athlete.visibilityScore||0)>0,(athlete.offers||[]).length>0||board.some(s=>s.hasOffer)];
  const progPts=[15,20,20,15,10,10,10];
  const progPct=Math.round(progItems.reduce((s,d,i)=>s+(d?progPts[i]:0),0)/progPts.reduce((a,b)=>a+b,0)*100);
  const TABS=[{id:"home",label:"Home",Ic:HomeIc},{id:"athlete",label:"Athlete",Ic:UserIc},{id:"schools",label:"Schools",Ic:SchoolIc},{id:"progress",label:"Progress",Ic:ChartIc,dot:progPct<80&&progPct>0},{id:"compare",label:"Compare",Ic:CompIc},{id:"scout",label:"Scout",Ic:ScoutIc}];
  return<div style={{minHeight:"100vh",background:C.bg}}>
    <div className="sticky top-0 z-40 flex items-center justify-between px-4 py-3" style={{background:`${C.card}F2`,borderBottom:`1px solid ${C.border}`,backdropFilter:"blur(16px)"}}>
      <div className="flex items-center gap-2.5"><SELogo size={34}/><div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:15,fontWeight:800,color:C.text,letterSpacing:1,lineHeight:1}}>SCHOLARS ELITE</div><div style={{fontSize:9,color:C.muted}}>Wells-Bradley Family</div></div></div>
      <div className="px-2.5 py-1 rounded-full text-xs font-bold" style={{background:C.fuchsia+"20",color:C.fuchsia,border:`1px solid ${C.fuchsia}33`}}>Parent View</div>
    </div>
    <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px 100px"}}>
      {tab==="home"    &&<HomeTab     athlete={athlete} board={board} feed={FEED}/>}
      {tab==="athlete" &&<AthleteTab  athlete={athlete} onSave={setAthlete}/>}
      {tab==="schools" &&<SchoolsTab  athlete={athlete} board={board} setBoard={setBoard}/>}
      {tab==="progress"&&<ProgressTab athlete={athlete} board={board}/>}
      {tab==="compare" &&<CompareTab  athlete={athlete} board={board}/>}
      {tab==="scout"   &&<ScoutTab    athlete={athlete}/>}
    </div>
    <div className="fixed bottom-0 left-0 right-0 flex justify-around items-center py-1.5 px-1" style={{background:`${C.card}F8`,borderTop:`1px solid ${C.border}`,backdropFilter:"blur(16px)"}}>
      {TABS.map(({id,label,Ic,dot})=>{const active=tab===id;return<button key={id} onClick={()=>setTab(id)} className="relative flex flex-col items-center gap-0.5 px-2 py-1.5 rounded-xl" style={{color:active?C.fuchsia:C.muted,background:active?C.fuchsia+"18":"transparent",cursor:"pointer",minWidth:44}}><Ic size={17}/><span style={{fontSize:9,fontWeight:600}}>{label}</span>{dot&&<div className="absolute top-0.5 right-0.5 w-2 h-2 rounded-full" style={{background:C.gold}}/>}</button>;})}
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
