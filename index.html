function FitSlider({label,maxPts,value=0,onChange}){const col=value>=8?C.green:value>=6?C.gold:value>=4?"#EA7316":C.red;return <div className="mb-3"><div className="flex items-center justify-between mb-1"><span style={{color:C.sub,fontSize:11,fontWeight:600}}>{label}</span><div className="flex items-center gap-2"><span style={{color:C.muted,fontSize:9}}>/{maxPts}pts</span><div className="w-6 h-6 rounded-full flex items-center justify-center text-xs font-black" style={{background:col+"22",color:col,border:`1px solid ${col}44`}}>{value}</div></div></div><div className="relative h-1.5 rounded-full" style={{background:C.border}}><div className="absolute left-0 top-0 h-full rounded-full transition-all" style={{width:`${value*10}%`,background:`linear-gradient(90deg,${C.primary},${col})`}}/><input type="range" min="0" max="10" value={value} onChange={e=>onChange(Number(e.target.value))} className="absolute inset-0 w-full h-full opacity-0" style={{cursor:"ew-resize"}}/></div></div>;}

        </div>
        <div className="w-12 h-12 rounded-xl flex items-center justify-center font-black ml-3 flex-shrink-0 text-base" style={{background:"rgba(255,255,255,0.15)",color:"white"}}>{athlete.name.split(" ").map(n=>n[0]).join("")}</div>
      </div>

ustom(c=>({...c,tier:t}))} className="px-2.5 py-1 rounded-lg text-xs font-bold" style={{background:custom.tier===t?TIER_COLOR[t]:C.card,color:custom.tier===t?"white":C.muted,border:`1px solid ${custom.tier===t?TIER_COLOR[t]:C.border}`,cursor:"pointer"}}>{t}</button>)}</div><button onClick={()=>custom.school.trim()&&setStep(2)} disabled={!custom.school.trim()} className="w-full py-2.5 rounded-xl text-sm font-bold" style={{background:custom.school.trim()?`linear-gradient(135deg,${C.primary},${C.fuchsia})`:C.border,color:"white",cursor:custom.school.trim()?"pointer":"default"}}>Rate This School →</button></div></>:<><div className="flex items-center justify-between p-4 rounded-xl mb-4" style={{background:C.card2,border:`1px solid ${color}44`}}><div><TierBadge tier={school.tier||"T3"}/><div style={{color,fontSize:12,fontWeight:600,marginTop:4}}>{rec}</div></div><ScoreRing score={score} size={68}/></div><div className="h-2 rounded-full overflow-hidden mb-4" style={{background:C.border}}><div className="h-full rounded-full transition-all" style={{width:`${score}%`,background:`linear-gradient(90deg,${C.primary},${color})`}}/></div>{Object.entries(FACTOR_LABELS).map(([k,lbl])=><FitSlider key={k} label={lbl} maxPts={MAX_PTS[k]} value={factors[k]} onChange={v=>setFactors(f=>({...f,[k]:v}))}/>)}<div className="mt-3"><label style={{color:C.muted,fontSize:10,fontWeight:700,display:"block",marginBottom:5}}>NOTES</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={2} className="w-full px-3 py-2.5 rounded-xl text-sm outline-none resize-none" style={{background:C.card2,border:`1px solid ${C.border}`,color:C.text,fontFamily:"inherit"}}/></div></>}
      </div>
      <div className="p-5 border-t flex gap-3" style={{borderColor:C.border}}>{step===2&&<button onClick={()=>setStep(1)} className="flex items-center gap-1.5 px-4 py-3 rounded-xl text-sm font-bold" style={{background:C.card2,color:C.muted,border:`1px solid ${C.border}`,cursor:"pointer"}}><ArrowLeft size={14}/>Back</button>}{step===2&&<button onClick={()=>onAdd({id:Date.now().toString(),school:school.school,conference:school.conference,tier:school.tier,factors,notes,hasOffer:false})} className="flex-1 py-3 rounded-xl font-bold text-sm" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`,color:"white",cursor:"pointer"}}>Add to Board — Score {score}/100</button>}</div>
    </div>
  </div>;
}

function EditSchoolModal({school,athlete,isStaff,onSave,onClose}){
  const[factors,setFactors]=useState({...school.factors});const[notes,setNotes]=useState(school.notes||"");const[hasOffer,setHasOffer]=useState(school.hasOffer||false);const[lastContact,setLastContact]=useState(school.lastContact||"");
  const score=calcScore(factors);const{band,color}=getBand(score);const plN=parseInt(athlete.playerLevel.replace("PL",""));const tN=parseInt(school.tier.replace("T",""));const rec=getRecruit(plN,tN,score);
  return <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-4" style={{background:"rgba(0,0,0,0.85)"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="w-full max-w-lg rounded-2xl overflow-hidden flex flex-col" style={{background:C.card,border:`1px solid ${C.border}`,maxHeight:"90vh"}}>
      <div className="flex items-center justify-between p-5 border-b" style={{borderColor:C.border}}><div><div style={{color:C.text,fontWeight:700,fontSize:17}}>{school.school}</div><TierBadge tier={school.tier}/></div><button onClick={onClose} style={{color:C.muted,cursor:"pointer"}}><X size={20}/></button></div>
      <div className="overflow-y-auto flex-1 p-5">
        <div className="flex items-center justify-between mb-2"><div><div style={{color:C.muted,fontSize:12}}>Live Score</div><div style={{color,fontSize:12,fontWeight:600}}>{rec}</div></div><ScoreRing score={score} size={68}/></div>
        <div className="h-2 rounded-full overflow-hidden mb-4" style={{background:C.border}}><div className="h-full rounded-full transition-all" style={{width:`${score}%`,background:`linear-gradient(90deg,${C.primary},${color})`}}/></div>
        {Object.entries(FACTOR_LABELS).map(([k,lbl])=><FitSlider key={k} label={lbl} maxPts={MAX_PTS[k]} value={factors[k]||0} onChange={v=>setFactors(f=>({...f,[k]:v}))}/>)}
        <label className="flex items-center gap-3 p-3 rounded-xl mb-4 cursor-pointer" style={{background:C.card2,border:`1px solid ${C.border}`}}><input type="checkbox" checked={hasOffer} onChange={e=>setHasOffer(e.target.checked)} style={{accentColor:C.green,width:16,height:16}}/><span style={{color:C.text,fontSize:14}}>Scholarship offer received</span></label>
        <div className="mb-4"><label style={{color:C.muted,fontSize:10,fontWeight:700,display:"block",marginBottom:5}}>LAST CONTACT DATE</label><input type="date" value={lastContact} onChange={e=>setLastContact(e.target.value)} className="w-full px-3 py-2.5 rounded-xl text-sm outline-none" style={{background:C.card2,border:`1px solid ${C.border}`,color:C.text,fontFamily:"inherit",colorScheme:"dark"}}/></div>
        <div><label style={{color:C.muted,fontSize:10,fontWeight:700,display:"block",marginBottom:5}}>NOTES</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} rows={3} className="w-full px-3 py-2.5 rounded-xl text-sm outline-none resize-none" style={{background:C.card2,border:`1px solid ${C.border}`,color:C.text,fontFamily:"inherit"}}/></div>
      </div>
      <div className="p-5 border-t" style={{borderColor:C.border}}><button onClick={()=>onSave({...school,factors,notes,hasOffer,lastContact})} className="w-full py-3 rounded-xl font-bold text-sm" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`,color:"white",cursor:"pointer"}}>Save — Score {score}/100·Band {band}</button></div>
    </div>
  </div>;
}

function SchoolBoard({athlete,board,isStaff,onAdd,onUpdate,onRemove}){
  const[showAdd,setShowAdd]=useState(false);const[editing,setEditing]=useState(null);const[sortBy,setSortBy]=useState("score");
  const scored=[...board].map(s=>({...s,score:calcScore(s.factors)})).sort((a,b)=>sortBy==="score"?b.score-a.score:sortBy==="school"?a.school.localeCompare(b.school):parseInt(a.tier.slice(1))-parseInt(b.tier.slice(1)));
  return <div>
    <div className="flex items-center justify-between mb-4"><div><div style={{color:C.text,fontWeight:700,fontSize:16}}>{board.length} School{board.length!==1?"s":""}</div><div style={{color:C.muted,fontSize:12}}>Tap to edit fit factors</div></div><div className="flex gap-2"><select value={sortBy} onChange={e=>setSortBy(e.target.value)} className="px-3 py-2 rounded-xl text-xs outline-none" style={{background:C.card,border:`1px solid ${C.border}`,color:C.sub,cursor:"pointer"}}><option value="score">By Score</option><option value="school">A–Z</option><option value="tier">By Tier</option></select><button onClick={()=>setShowAdd(true)} className="flex items-center gap-1.5 px-4 py-2 rounded-xl text-sm font-bold" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`,color:"white",cursor:"pointer"}}><Plus size={14}/>Add</button></div></div>
    <div className="flex flex-col gap-3">{scored.map(s=>{const{band,color}=getBand(s.score);const plN=parseInt(athlete.playerLevel.replace("PL",""));const tN=parseInt(s.tier.replace("T",""));const rec=getRecruit(plN,tN,s.score);return <div key={s.id} className="rounded-2xl overflow-hidden" style={{background:C.card,border:`1px solid ${C.border}`}}><div className="p-4"><div className="flex items-start gap-3"><ScoreRing score={s.score} size={60}/><div className="flex-1 min-w-0"><div style={{color:C.text,fontWeight:700,fontSize:15}}>{s.school}</div><div style={{color:C.muted,fontSize:12,marginBottom:6}}>{s.conference}</div><div className="flex flex-wrap gap-1.5"><TierBadge tier={s.tier}/><Badge color={color}>{rec}</Badge>{s.hasOffer&&<Badge color={C.green}>✓ Offer</Badge>}</div></div></div><div className="mt-3 grid grid-cols-4 gap-1">{Object.entries(s.factors).map(([k,v])=>{const c=v>=8?C.green:v>=6?C.gold:v>=4?"#EA7316":C.red;return <div key={k} title={`${FACTOR_LABELS[k]}: ${v}/10`}><div style={{color:C.muted,fontSize:9,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{FACTOR_LABELS[k].split(" ")[0]}</div><div className="h-1.5 rounded-full" style={{background:C.border}}><div style={{width:`${v*10}%`,height:"100%",borderRadius:9999,background:c}}/></div></div>;})} </div>{s.notes&&<div style={{color:C.muted,fontSize:12,fontStyle:"italic",marginTop:8}}>"{s.notes}"</div>}</div><div className="flex" style={{borderTop:`1px solid ${C.border}`}}><button onClick={()=>setEditing(s)} className="flex-1 py-2.5 text-xs font-bold flex items-center justify-center gap-1.5" style={{color:C.primary,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=C.primary+"15"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><Sliders size={12}/>Edit Fit Factors</button><div style={{width:1,background:C.border}}/><button onClick={()=>onRemove(s.id)} className="px-5 py-2.5 flex items-center justify-center" style={{color:C.red,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.background=C.red+"15"} onMouseLeave={e=>e.currentTarget.style.background="transparent"}><Trash2 size={13}/></button></div></div>;})}</div>
    {board.length===0&&<div className="rounded-2xl p-10 text-center mt-2" style={{background:C.card,border:`1px dashed ${C.border}`}}><School size={30} style={{color:C.muted,margin:"0 auto 12px"}}/><div style={{color:C.text,fontWeight:600,marginBottom:4}}>Board is empty</div><div style={{color:C.muted,fontSize:13,marginBottom:16}}>Add schools and rate fit to see scores update live</div><button onClick={()=>setShowAdd(true)} className="px-6 py-3 rounded-xl font-bold text-sm" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`,color:"white",cursor:"pointer"}}>+ Add First School</button></div>}
    {showAdd&&<AddSchoolModal athlete={athlete} board={board} isStaff={isStaff} onAdd={s=>{onAdd(s);setShowAdd(false);}} onClose={()=>setShowAdd(false)}/>}
    {editing&&<EditSchoolModal school={editing} athlete={athlete} isStaff={isStaff} onSave={s=>{onUpdate(s);setEditing(null);}} onClose={()=>setEditing(null)}/>}
  </div>;
}

function StaffView({athletes,boards,onUpdateAthlete,onUpdateBoard}){
  const[selected,setSelected]=useState(null);const[tab,setTab]=useState("dashboard");const list=Object.values(athletes);
  if(selected){const athlete=athletes[selected];const board=boards[selected]||[];return <div><button onClick={()=>setSelected(null)} className="flex items-center gap-2 mb-5 text-sm font-bold" style={{color:C.primary,cursor:"pointer"}}><ArrowLeft size={14}/>Roster</button><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,color:C.text,marginBottom:10}}>{athlete.name}</div><div className="flex gap-2 mb-5 pb-4 border-b" style={{borderColor:C.border}}>{["dashboard","athlete","schools"].map(t=><button key={t} onClick={()=>setTab(t)} className="px-4 py-2 rounded-xl text-sm font-bold capitalize" style={{background:tab===t?C.primary:C.card2,color:tab===t?"white":C.muted,cursor:"pointer"}}>{t}</button>)}</div>{tab==="dashboard"&&<Dashboard athlete={athlete} board={board} feed={SEED_FEED[selected]||[]}/>}{tab==="athlete"&&<AthleteEditor athlete={athlete} isStaff={true} onSave={u=>onUpdateAthlete(selected,u)}/>}{tab==="schools"&&<SchoolBoard athlete={athlete} board={board} isStaff={true} onAdd={s=>onUpdateBoard(selected,[...board,s])} onUpdate={s=>onUpdateBoard(selected,board.map(b=>b.id===s.id?s:b))} onRemove={id=>onUpdateBoard(selected,board.filter(b=>b.id!==id))}/>}</div>;}
  return <div><div className="mb-5"><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:26,fontWeight:800,color:C.text}}>Roster</div><div style={{color:C.muted,fontSize:13}}>{list.length} athletes in the portal</div></div><div className="flex flex-col gap-3">{list.map(a=>{const ab=boards[a.id]||[];const scored=ab.map(s=>calcScore(s.factors));const top=scored.length?Math.max(...scored):0;const{color}=getBand(top);const p1=ab.filter(s=>getBand(calcScore(s.factors)).band==="A1").length;return <button key={a.id} onClick={()=>{setSelected(a.id);setTab("dashboard");}} className="flex items-center gap-4 p-4 rounded-2xl text-left w-full" style={{background:C.card,border:`1px solid ${C.border}`,cursor:"pointer"}} onMouseEnter={e=>e.currentTarget.style.borderColor=C.primary} onMouseLeave={e=>e.currentTarget.style.borderColor=C.border}><div className="w-11 h-11 rounded-xl flex items-center justify-center font-black flex-shrink-0 text-sm" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`,color:"white"}}>{a.name.split(" ").map(n=>n[0]).join("")}</div><div className="flex-1 min-w-0"><div style={{color:C.text,fontWeight:700,fontSize:14}}>{a.name}</div><div style={{color:C.muted,fontSize:11}}>{a.position}·{a.height}·{a.gradYear}</div><div className="flex flex-wrap gap-1.5 mt-1"><PLBadge level={a.playerLevel}/><Badge color={C.gold}>GPA {a.gpa}</Badge>{p1>0&&<Badge color={C.red}>🔴 {p1} P1</Badge>}</div></div><div className="text-right flex-shrink-0">{top>0?<><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:28,fontWeight:800,color,lineHeight:1}}>{top}</div><div style={{color:C.muted,fontSize:10}}>top fit</div></>:<div style={{color:C.muted,fontSize:12}}>No board</div>}</div></button>;})} </div></div>;
}

function App(){
  const[user,setUser]=useState(null);const[tab,setTab]=useState("dashboard");const[athletes,setAthletes]=useState(SEED_ATHLETES);const[boards,setBoards]=useState(SEED_BOARDS);
  const isStaff=user?.role==="staff";const athlete=user&&!isStaff?athletes[user.athleteId]:null;const board=user&&!isStaff?boards[user.athleteId]||[]:[];const feed=user&&!isStaff?SEED_FEED[user.athleteId]||[]:[];
  const updateAthlete=(id,u)=>setAthletes(a=>({...a,[id]:{...a[id],...u}}));const updateBoard=(id,b)=>setBoards(b2=>({...b2,[id]:b}));
  if(!user)return <LoginScreen onLogin={u=>{setUser(u);setTab("dashboard");}}/>;
  return <div style={{minHeight:"100vh",background:C.bg}}>
    <div className="sticky top-0 z-40 flex items-center justify-between px-4 py-3" style={{background:`${C.card}F2`,borderBottom:`1px solid ${C.border}`,backdropFilter:"blur(16px)"}}>
      <div className="flex items-center gap-2.5"><div className="w-9 h-9 rounded-xl flex items-center justify-center" style={{background:`linear-gradient(135deg,${C.primary},${C.fuchsia})`}}><Trophy size={17} color="white"/></div><div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,fontWeight:800,color:C.text,letterSpacing:1,lineHeight:1}}>SCHOLARS ELITE</div><div style={{fontSize:10,color:isStaff?C.fuchsia:C.muted,fontWeight:isStaff?700:400}}>{isStaff?"STAFF VIEW":user.name}</div></div></div>
      <button onClick={()=>{setUser(null);setTab("dashboard");}} className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold" style={{color:C.muted,border:`1px solid ${C.border}`,cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.background=C.border;e.currentTarget.style.color=C.text;}} onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.color=C.muted;}}><LogOut size={13}/>Sign Out</button>
    </div>
    <div style={{maxWidth:560,margin:"0 auto",padding:"20px 16px 100px"}}>
      {isStaff?<StaffView athletes={athletes} boards={boards} onUpdateAthlete={updateAthlete} onUpdateBoard={updateBoard}/>:<>{tab==="dashboard"&&<Dashboard athlete={athlete} board={board} feed={feed}/>}{tab==="athlete"&&<AthleteEditor athlete={athlete} isStaff={false} onSave={u=>updateAthlete(user.athleteId,u)}/>}{tab==="schools"&&<SchoolBoard athlete={athlete} board={board} isStaff={false} onAdd={s=>updateBoard(user.athleteId,[...board,s])} onUpdate={s=>updateBoard(user.athleteId,board.map(b=>b.id===s.id?s:b))} onRemove={id=>updateBoard(user.athleteId,board.filter(b=>b.id!==id))}/>}</>}
    </div>
    {!isStaff&&<div className="fixed bottom-0 left-0 right-0 flex justify-around items-center py-2 px-4" style={{background:`${C.card}F8`,borderTop:`1px solid ${C.border}`,backdropFilter:"blur(16px)"}}>{[{id:"dashboard",label:"Home",Ic:Home},{id:"athlete",label:"Athlete",Ic:UserIcon},{id:"schools",label:"Schools",Ic:School}].map(({id,label,Ic})=>{const active=tab===id;return <button key={id} onClick={()=>setTab(id)} className="flex flex-col items-center gap-1 px-8 py-2 rounded-xl" style={{color:active?C.fuchsia:C.muted,background:active?C.fuchsia+"18":"transparent",cursor:"pointer"}}><Ic size={20}/><span style={{fontSize:10,fontWeight:600}}>{label}</span></button>;})}
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
