[[redirects]]
  from = "/raegan-demo"
  to = "/raegan-demo/index.html"
  status = 200

[[redirects]]
  from = "/raegan-demo/*"
  to = "/raegan-demo/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
